browser:
  home_url: "https://www.xiaohongshu.com/explore"
  login_url: "https://www.xiaohongshu.com/"
  login_candidates:
    - "https://www.xiaohongshu.com/"
    - "https://www.xiaohongshu.com/explore"
    - "https://www.xiaohongshu.com/search_result"
  headless: false
  slow_mo_ms: 200
  default_timeout_ms: 20000
  storage_state_path: "sessions/xiaohongshu_storage_state.json"
  ignore_https_errors: true
  locale: "zh-CN"
  timezone_id: "Asia/Shanghai"
  user_agent: "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
  launch_args:
    - "--disable-blink-features=AutomationControlled"
    - "--disable-quic"
    - "--disable-dev-shm-usage"

crawl:
  raw_posts_path: "data/raw/raw_posts.jsonl"
  raw_comments_path: "data/raw/raw_comments.jsonl"
  batches: 3
  posts_per_batch: 10
  comments_per_post: 40
  max_scroll_rounds: 20
  feed_scroll_px: 1600
  post_open_wait_ms: 2000
  comment_expand_clicks: 6
  comment_scroll_rounds: 8
  comment_scroll_px: 900
  dedupe_fallback_salt: "public-opinion-v1"

clean:
  input_path: "data/raw/raw_comments.jsonl"
  output_path: "data/clean/clean_comments.jsonl"
  min_text_length: 2
  drop_pattern_texts:
    - "作者赞过"
    - "置顶"
    - "展开"
    - "查看更多回复"

labeling:
  input_path: "data/clean/clean_comments.jsonl"
  output_path: "data/labeled/labeled_comments.jsonl"
  batch_size: 1
  max_retries: 3
  retry_backoff_seconds: 2.0
  low_confidence_threshold: 0.7
  review_on_short_text_chars: 6
  prompt_version: "v1-explicit-sentiment"

validation:
  input_path: "data/labeled/labeled_comments.jsonl"
  report_path: "data/exports/validation_report.json"
  manual_review_path: "data/exports/manual_review_sample.csv"
  manual_review_sample_size: 200
  random_seed: 42

export:
  input_path: "data/labeled/labeled_comments.jsonl"
  output_dir: "data/exports"
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  random_seed: 42
